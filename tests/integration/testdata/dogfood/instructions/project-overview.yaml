id: project-overview
kind: instruction
preservation: preferred
content: |
  GoAgentMeta is a compiler-based control plane for AI-agent metadata.
  Author once in a canonical source tree, compile to native artifacts
  for multiple target ecosystems (Claude Code, Cursor, GitHub Copilot, Codex).

  Architecture: Hexagonal (Ports & Adapters) + DDD + Clean Architecture.
  Pipeline: parse → validate → resolve → normalize → plan → capability → lower → render → materialize → report.
