id: go-standards
kind: instruction
preservation: preferred
scope:
  fileTypes: [".go"]
content: |
  Follow standard Go idioms and effective Go guidelines.
  Use descriptive variable names; avoid single-letter names except loop indices.
  Error handling: always check errors; wrap with context using fmt.Errorf.
  Use structured errors for compiler and pipeline operations.
  Maximum ~500 lines per Go file. Split files instead of reducing documentation.
